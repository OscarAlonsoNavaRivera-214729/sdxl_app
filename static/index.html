<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #07090f;
    --surface:  #0d1117;
    --panel:    #111520;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.13);
    --text:     #e2e4ec;
    --muted:    #6b7280;
    --accent:   #7c6af7;
    --accent2:  #a78bfa;
    --star:     rgba(255,255,255,0.55);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', system-ui, sans-serif;
    font-size: 15px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 25%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 8%,  var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 68% 33%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 12%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 27% 55%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 54% 72%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 91% 61%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 7%  80%, var(--star) 0%, transparent 100%),
      radial-gradient(1px 1px at 76% 88%, var(--star) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 33% 42%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 61% 19%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(2px 2px at 48% 93%,  rgba(180,160,255,0.6)   0%, transparent 100%),
      radial-gradient(ellipse 55% 35% at 50% 0%,   rgba(90,70,180,0.18) 0%, transparent 70%),
      radial-gradient(ellipse 40% 25% at 20% 100%, rgba(60,40,140,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative; z-index: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(7,9,15,0.8);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: .6rem;
    font-size: .95rem;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -.01em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .model-badge {
    font-size: .7rem;
    padding: .25rem .65rem;
    border-radius: 99px;
    border: 1px solid var(--border2);
    color: var(--muted);
    letter-spacing: .03em;
  }

  /* Chat area */
  #chat {
    position: relative; z-index: 1;
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 1rem;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .msg-wrap {
    max-width: 720px;
    margin: 0 auto 1.5rem;
    display: flex;
    flex-direction: column;
    gap: .5rem;
  }

  /* User bubble */
  .msg-user {
    align-self: flex-end;
    background: var(--accent);
    color: #fff;
    padding: .65rem 1rem;
    border-radius: 18px 18px 4px 18px;
    max-width: 75%;
    font-size: .92rem;
    line-height: 1.5;
  }

  /* Bot response */
  .msg-bot {
    align-self: flex-start;
    max-width: 85%;
  }

  .bot-label {
    font-size: .7rem;
    color: var(--muted);
    margin-bottom: .4rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }

  .bot-label::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
  }

  /* Image card */
  .img-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    width: 420px;
    max-width: 100%;
  }

  .img-card img {
    width: 100%;
    display: block;
    animation: fadeIn .5s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .img-card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: .75rem 1rem;
    border-top: 1px solid var(--border);
  }

  .img-meta {
    font-size: .72rem;
    color: var(--muted);
  }

  .btn-download {
    background: transparent;
    border: 1px solid var(--border2);
    color: var(--text);
    padding: .35rem .85rem;
    border-radius: 8px;
    font-size: .75rem;
    font-family: inherit;
    cursor: pointer;
    transition: background .15s, border-color .15s;
  }

  .btn-download:hover { background: var(--border); border-color: var(--border2); }

  /* Thinking bubble */
  .thinking {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: .65rem .9rem;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px 18px 18px 4px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce .9s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* Error bubble */
  .msg-error {
    align-self: flex-start;
    background: rgba(220,60,60,0.1);
    border: 1px solid rgba(220,60,60,0.25);
    color: #f87171;
    padding: .65rem 1rem;
    border-radius: 18px 18px 18px 4px;
    font-size: .88rem;
    max-width: 80%;
  }

  /* Empty state */
  #empty {
    max-width: 420px;
    margin: 3rem auto;
    text-align: center;
  }

  #empty .orb {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #a78bfa, #4c35c9);
    margin: 0 auto 1.25rem;
    opacity: .9;
  }

  #empty h2 { font-size: 1.15rem; font-weight: 500; margin-bottom: .5rem; }
  #empty p  { font-size: .85rem; color: var(--muted); line-height: 1.6; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: .5rem;
    justify-content: center;
    margin-top: 1.25rem;
  }

  .suggestion {
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: .45rem .9rem;
    border-radius: 99px;
    font-size: .78rem;
    font-family: inherit;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }

  .suggestion:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); }

  /* Bottom bar */
  .bottom {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(12px);
    padding: .85rem 1rem 1rem;
    flex-shrink: 0;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: .75rem;
    max-width: 720px;
    margin: 0 auto .65rem;
  }

  /* Style chips */
  .style-select {
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: .78rem;
    padding: .4rem .7rem;
    border-radius: 8px;
    outline: none;
    cursor: pointer;
    flex-shrink: 0;
  }

  .style-select:focus { border-color: var(--accent); }

  /* Quality slider */
  .quality-wrap {
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-shrink: 0;
  }

  .quality-wrap span { font-size: .72rem; color: var(--muted); white-space: nowrap; }

  input[type="range"].quality {
    -webkit-appearance: none;
    width: 90px; height: 3px;
    background: var(--border2);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"].quality::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 13px; height: 13px;
    border-radius: 50%;
    background: var(--accent2);
    cursor: pointer;
  }

  /* Input row */
  .input-row {
    display: flex;
    align-items: flex-end;
    gap: .6rem;
    max-width: 720px;
    margin: 0 auto;
  }

  #promptInput {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: inherit;
    font-size: .92rem;
    padding: .7rem 1rem;
    border-radius: 12px;
    outline: none;
    resize: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color .2s;
  }

  #promptInput::placeholder { color: var(--muted); }
  #promptInput:focus { border-color: var(--accent); }

  #sendBtn {
    width: 42px; height: 42px;
    flex-shrink: 0;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .15s, transform .1s;
  }

  #sendBtn:hover:not(:disabled) { background: var(--accent2); }
  #sendBtn:active:not(:disabled) { transform: scale(.95); }
  #sendBtn:disabled { opacity: .4; cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; fill: #fff; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Image Forge
  </div>
  <div class="model-badge">SDXL 1.0</div>
</header>

<div id="chat">
  <div id="empty">
    <div class="orb"></div>
    <h2>Genera cualquier imagen</h2>
    <p>Describe lo que quieres ver y el modelo lo crea para ti.</p>
    <div class="suggestions">
      <button class="suggestion" onclick="useSuggestion(this)">Caballero medieval en llamas</button>
      <button class="suggestion" onclick="useSuggestion(this)">Ciudad cyberpunk nocturna</button>
      <button class="suggestion" onclick="useSuggestion(this)">Retrato cinematografico</button>
      <button class="suggestion" onclick="useSuggestion(this)">Montana nevada al atardecer</button>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="controls-row">
    <select class="style-select" id="styleSelect">
      <option value="realistic">Fotorrealista</option>
      <option value="fantasy">Fantasia oscura</option>
      <option value="scifi">Ciencia ficcion</option>
      <option value="portrait">Retrato</option>
      <option value="landscape">Paisaje epico</option>
    </select>

    <div class="quality-wrap">
      <span>Rapido</span>
      <input type="range" class="quality" id="qualitySlider" min="1" max="3" step="1" value="2"/>
      <span>Detallado</span>
    </div>
  </div>

  <div class="input-row">
    <textarea id="promptInput" placeholder="Describe la imagen que quieres generar..." rows="1"></textarea>
    <button id="sendBtn" onclick="generate()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const STYLE_PARAMS = {
  realistic: {
    suffix: ', photorealistic, ultra detailed, sharp focus, 8k, masterpiece',
    negative: 'cartoon, anime, illustration, painting, low quality, blurry, watermark, text',
    cfg: 7.5
  },
  fantasy: {
    suffix: ', cinematic dark fantasy atmosphere, dramatic lighting, photorealistic, masterpiece',
    negative: 'cartoon, anime, low poly, plastic, bright colors, blurry, watermark',
    cfg: 8.0
  },
  scifi: {
    suffix: ', futuristic, cinematic lighting, ultra detailed, photorealistic, 8k',
    negative: 'cartoon, anime, medieval, nature, blurry, watermark, low quality',
    cfg: 7.5
  },
  portrait: {
    suffix: ', cinematic portrait, dramatic side lighting, shallow depth of field, film grain, Kodak Portra 400, photorealistic',
    negative: 'cartoon, anime, painting, illustration, full body, low quality, watermark',
    cfg: 9.0
  },
  landscape: {
    suffix: ', epic landscape, volumetric light rays, ultra realistic photography, sharp focus, masterpiece',
    negative: 'people, buildings, cartoon, anime, blurry, watermark, text',
    cfg: 8.0
  }
};

const QUALITY_STEPS = { 1: 20, 2: 30, 3: 45 };

let generating = false;

function useSuggestion(btn) {
  document.getElementById('promptInput').value = btn.textContent;
  generate();
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

document.getElementById('promptInput').addEventListener('input', function() {
  autoResize(this);
});

document.getElementById('promptInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    generate();
  }
});

function hideEmpty() {
  const el = document.getElementById('empty');
  if (el) el.remove();
}

function appendUserMsg(text) {
  hideEmpty();
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `<div class="msg-user">${escHtml(text)}</div>`;
  chat.appendChild(wrap);
  return wrap;
}

function appendThinking() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap';
  wrap.innerHTML = `
    <div class="bot-label">Image Forge</div>
    <div class="thinking">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function replaceWithImage(wrap, b64, prompt, params) {
  const steps = params.num_inference_steps;
  const style = document.getElementById('styleSelect').options[document.getElementById('styleSelect').selectedIndex].text;

  wrap.innerHTML = `
    <div class="bot-label">Image Forge</div>
    <div class="img-card">
      <img src="data:image/png;base64,${b64}" alt="${escHtml(prompt)}"/>
      <div class="img-card-footer">
        <span class="img-meta">${style} &middot; ${steps} pasos</span>
        <button class="btn-download" onclick="download('${b64}')">Descargar</button>
      </div>
    </div>`;
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function replaceWithError(wrap, msg) {
  wrap.innerHTML = `
    <div class="bot-label">Image Forge</div>
    <div class="msg-error">${escHtml(msg)}</div>`;
}

function download(b64) {
  const a = document.createElement('a');
  a.href = 'data:image/png;base64,' + b64;
  a.download = 'image_forge_' + Date.now() + '.png';
  a.click();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function generate() {
  if (generating) return;

  const input = document.getElementById('promptInput');
  const prompt = input.value.trim();
  if (!prompt) return;

  const style  = document.getElementById('styleSelect').value;
  const quality = parseInt(document.getElementById('qualitySlider').value);
  const sp     = STYLE_PARAMS[style];
  const steps  = QUALITY_STEPS[quality];

  generating = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  input.style.height = 'auto';

  appendUserMsg(prompt);
  const thinkWrap = appendThinking();

  const fullPrompt = prompt + sp.suffix;

  try {
    const resp = await fetch('/generate', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'ngrok-skip-browser-warning': 'true'
      },
      body: JSON.stringify({
        prompt: fullPrompt,
        negative_prompt: sp.negative,
        guidance_scale: sp.cfg,
        num_inference_steps: steps,
        width: 1024,
        height: 1024
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: 'Error desconocido' }));
      throw new Error(err.detail || 'Error ' + resp.status);
    }

    const data = await resp.json();
    replaceWithImage(thinkWrap, data.image_base64, prompt, data.parameters);

  } catch (e) {
    replaceWithError(thinkWrap, e.message);
  } finally {
    generating = false;
    document.getElementById('sendBtn').disabled = false;
  }
}
</script>
</body>
</html>
